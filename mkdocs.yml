site_name: Secretaría de Innovación y Transformación
site_description: Portal de proyectos e información de la Secretaría de Innovación y Transformación — UTN
site_url: https://andrescerutti.github.io/utn-info/

theme:
  name: material
  language: es
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Modo oscuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Modo claro
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Inicio: index.md
  - Proyectos:
      - proyectos/index.md
      - Estacionamiento: proyectos/estacionamiento.md
  - Recursos: recursos.md
  - Interno: interno/index.md

plugins:
  - search:
      lang: es
  - encryptcontent:
      title_prefix: "🔒 "
      summary: "Contenido protegido con clave"
      placeholder: "Ingresá la clave"
      decryption_failure_message: "Clave incorrecta, probá de nuevo"
      encryption_info_message: "Pedile la clave al responsable de la sección."
      # La clave NO vive en el repo: viene de una variable de entorno
      # (en GitHub Actions, del secret UTN_CLAVE_INTERNO).
      password_inventory:
        interno: !ENV [UTN_CLAVE_INTERNO, "clave-solo-para-pruebas-locales"]

extra:
  generator: false

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true
