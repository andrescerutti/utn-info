name: Publicar sitio

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: mkdocs gh-deploy --force
        env:
          UTN_CLAVE_INTERNO: ${{ secrets.UTN_CLAVE_INTERNO || 'utn-interno-2026' }}
